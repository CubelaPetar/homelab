## NAS Samba Configuration

[global]
  workgroup = HOME
  server string = turtle
  security = user
  guest ok = yes
  map to guest = Bad Password

  # Disable netbios/wins support
  disable netbios = yes
  dns proxy = no

  log file = /var/log/samba/%m.log
  max log size = 50
  printcap name = /dev/null
  load printers = no

# Samba Shares
[ISOs]
  path = /mnt/disk1/isos
  public = yes
  browseable = yes
  read only = no
  guest ok = yes
  valid users = @smbusers
  write list = @smbusers

[projects]
  comment = projects folder
  path = /mnt/ssd/projects
  browseable = yes
  read only = no
  guest ok = no
  valid users = @smbusers
  write list = @smbusers

[paperless]
  comment = Scanned Documents
  path = /home/reliyya/docker/consume
  browseable = yes
  read only = no
  guest ok = no
  valid users = @smbusers
  write list = @smbusers

