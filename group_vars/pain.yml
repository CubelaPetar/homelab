hostname: pain
domain_base: reliyya.xyz

domain: "{{ hostname }}.{{ domain_base}}"

#storage_mp: /mnt/disk1

ssd_storage:
  - path: /mnt/ssd
    content: true
    diskbyid: /dev/disk/by-id/ata-Samsung_SSD_870_EVO_1TB_S75CNX0W919785R-part1
    fs: ext4
    opts: defaults

# ironicbadger.snapraid
snapraid_data_disks:
  - path: /mnt/disk1
    content: true
    diskbyid: /dev/disk/by-id/ata-WDC_WD40EFAX-68JH4N0_WD-WX52D3067UAH-part1
    fs: ext4
    opts: defaults

  #  - path: /mnt/disk2
  #    content: true
  #  - path: /mnt/disk3
  #    content: true

snapraid_parity_disks:
  - path: /mnt/parity1
    content: true
    diskbyid: /dev/disk/by-id/ata-WDC_WD40EFAX-68JH4N0_WD-WX62D302F6P3-part1
    fs: ext4
    opts: defaults

snapraid_content_files:
  - /var/snapraid.content
  #- /mnt/ssd-disk1/snapraid.content

snapraid_config_excludes:
  - "*.unrecoverable"
  - /lost+found/
  - "*.!sync"
  - /tmp/

# geerlingguy.nfs
nfs_root_path: /mnt/ssd/pve-neo
nfs_exports:
  ["{{ nfs_root_path }}    10.56.0.1/32(rw,sync,no_root_squash,fsid=0)"]

package_list:
  - bash-completion
  - curl
  - rsync
  - git
  - htop
  - iftop
  - iotop
  - lm-sensors
  - net-tools
  - nfs-kernel-server
  - nmap
  - openssh-server
  - python3
  - smartmontools
  - sudo
  - vim
  - tree
  - wget
  - unattended-upgrades
  - apticron
  - apt-listchanges
  - libsensors5
  - figlet
  - wakeonlan
  - ethtool
  - libpam-tmpdir
  #- apt-listbugs
  - needrestart
    #- fail2ban

# ironicbadger.docker_compose_generator
appdata_path: /mnt/ssd/appdata
download_path: /mnt/disk1/downloads
docker_compose_generator_output_path: /home/{{ main_username }}/docker/
containers:
  - service_name: traefik
    active: true
    image: traefik
    container_name: tr
    ports:
      - 80:80
      - 443:443
    command:
      - --log.level=info
      - --accesslog=false
      - --api.insecure=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls.certresolver=cloudflare
      - --certificatesresolvers.cloudflare.acme.dnschallenge=true
      - --certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare
      - "--certificatesresolvers.cloudflare.acme.email={{ cloudflare_account_email }}"
      - --certificatesresolvers.cloudflare.acme.storage=/letsencrypt/acme.json
      - --serversTransport.insecureSkipVerify=true
    volumes:
      - "/opt/appdata/traefik/letsencrypt:/letsencrypt"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    environment:
      - "CLOUDFLARE_EMAIL={{ cloudflare_account_email }}"
      - "CLOUDFLARE_API_KEY={{ cloudflare_api_key }}"
    restart: unless-stopped

  - service_name: librespeed
    active: true
    image: lscr.io/linuxserver/librespeed:latest
    container_name: librespeed
    environment:
      - PUID="{{ main_uid }}"
      - PGID="{{ main_gid }}"
      - TZ="{{ ntp_timezone }}"
      - PASSWORD="{{ password }}"
      - MODE=standalone
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.librespeed.rule=Host(`speed.{{ domain }}`)"
      #- "traefik.http.routers.librespeed.entrypoints=websecure"
      #- "traefik.http.routers.librespeed.tls=true"
      #- "traefik.http.routers.librespeed.tls.certresolver=cloudflare"
      #- "traefik.http.services.librespeed.loadbalancer.server.scheme=https"
      - "traefik.http.services.librespeed.loadbalancer.server.port=80"
    restart: unless-stopped

  #- service_name: syncthing
  #  active: true
  #  image: lscr.io/linuxserver/syncthing:latest
  #  container_name: syncthing
  #  hostname: syncthing #optional
  #  environment:
  #    - PUID={{ main_uid }}
  #    - PGID={{ main_gid }}
  #    - TZ={{ ntp_timezone }}
  #  volumes:
  #    - "{{ appdata_path }}/apps/syncthing:/config"
  #    - ./syncthing_data:/data
  #  labels:
  #    - "traefik.enable=true"
  #    - "traefik.http.routers.syncthing.rule=Host(`sync.{{ domain }}`)"
  #    #      - "traefik.http.routers.syncthing.entrypoints=https"
  #    #      - "traefik.http.routers.syncthing.tls=true"
  #    - "traefik.http.services.syncthing.loadbalancer.server.port=8384"
  #  ports:
  #    #- 8384:8384
  #    - 22000:22000/tcp
  #    - 22000:22000/udp
  #    - 21027:21027/udp
  #  restart: unless-stopped

  - service_name: jellyfin
    active: true
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID={{ main_uid }}
      - PGID={{ main_gid }}
      - TZ={{ ntp_timezone }}
      - JELLYFIN_PublishedServerUrl=jellfin.{{ domain }} #optional
      - DOCKER_MODS=linuxserver/mods:jellyfin-opencl-intel
    volumes:
      - "{{ appdata_path }}/mediaservers/jellyfin:/config"
      - /mnt/disk1/vids/movies:/media:ro
      - /mnt/disk1/vids/series:/media2:ro
    devices:
      - /dev/dri:/dev/dri
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.{{ domain }}`)"
      #      - "traefik.http.routers.jellyfin.entrypoints=https"
      #      - "traefik.http.routers.jellyfin.tls=true"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
    ports:
      - 8096:8096
      #- 8920:8920 #optional
      #- 7359:7359/udp #optional
      #- 1900:1900/udp #optional
    restart: unless-stopped

  - service_name: radarr
    active: true
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
    volumes:
      - "{{ appdata_path }}/arrthings/data:/config"
      - /mnt/disk1/vids/movies:/movies #optional
      - "{{ download_path }}/complete/movies:/downloads" #optional
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.{{ domain }}`)"
      #      - "traefik.http.routers.radarr.entrypoints=https"
      #      - "traefik.http.routers.radarr.tls=true"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
      #    ports:
      #      - 7878:7878
    restart: unless-stopped

  - service_name: immich-server
    active: true
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.immich_server.rule=Host(`immich.{{ domain }}`)"
      #      - "traefik.http.routers.immich_server.entrypoints=https"
      #      - "traefik.http.routers.immich_server.tls=true"
      - "traefik.http.services.immich_server.loadbalancer.server.port=3001"
    ports:
      - 2283:2283
    depends_on:
      - redis
      - database
    restart: unless-stopped

  #  - service_name: immich-microservices
  #    active: true
  #    container_name: immich_microservices
  #    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
  #    # extends: # uncomment this section for hardware acceleration - see https://immich.app/docs/features/hardware-transcoding
  #    #   file: hwaccel.transcoding.yml
  #    #   service: cpu # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
  #    command: ["start.sh", "microservices"]
  #    volumes:
  #      - ${UPLOAD_LOCATION}:/usr/src/app/upload
  #      - /etc/localtime:/etc/localtime:ro
  #    env_file:
  #      - .env
  #    depends_on:
  #      - redis
  #      - database
  #    restart: unless-stopped

  - service_name: immich-machine-learning
    active: true
    container_name: immich_machine_learning
    # For hardware acceleration, add one of -[armnn, cuda, openvino] to the image tag.
    # Example tag: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    # extends: # uncomment this section for hardware acceleration - see https://immich.app/docs/features/ml-hardware- acceleration
    #   file: hwaccel.ml.yml
    #   service: cpu # set to one of [armnn, cuda, openvino, openvino-wsl] for accelerated inference - use the `-wsl` version for WSL2 where applicable
    volumes:
      - "{{ appdata_path }}/apps/immich_model-cache:/cache"
    env_file:
      - .env
    restart: unless-stopped

  - service_name: redis
    active: true
    container_name: immich_redis
    image: registry.hub.docker.com/library/redis:6.2-alpine@sha256:51d6c56749a4243096327e3fb964a48ed92254357108449cb6e23999c37773c5
    restart: unless-stopped

  - service_name: database
    active: true
    container_name: immich_postgres
    image: registry.hub.docker.com/tensorchord/pgvecto-rs:pg14-v0.2.0@sha256:90724186f0a3517cf6914295b5ab410db9ce23190a2d9d0b9dd6463e3fa298f0
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_DB=${DB_DATABASE_NAME}
    volumes:
      - "{{ appdata_path }}/apps/immich_pgdata:/var/lib/postgresql/data"
    restart: unless-stopped

  - service_name: broker
    active: true
    image: docker.io/library/redis:7
    restart: unless-stopped
    volumes:
      - "{{ appdata_path }}/apps/paperless_redis:/data"

  - service_name: db
    active: true
    image: docker.io/library/postgres:16
    restart: unless-stopped
    volumes:
      - "{{ appdata_path }}/apps/paperless_pgdata:/var/lib/postgresql/data"
    environment:
      - POSTGRES_DB=paperless
      - POSTGRES_USER=paperless
      - POSTGRES_PASSWORD=paperless

  - service_name: webserver
    active: true
    container_name: paperless
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on:
      - db
      - broker
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.paperless.rule=Host(`paperless.{{ domain }}`)"
      #      - "traefik.http.routers.paperless.entrypoints=https"
      #      - "traefik.http.routers.paperless.tls=true"
      - "traefik.http.services.paperless.loadbalancer.server.port=8000"
    ports:
      - "8000:8000"
    volumes:
      - "{{ appdata_path }}/apps/paperless_data:/usr/src/paperless/data"
      - "{{ appdata_path }}/mediaservers/paperless:/usr/src/paperless/media"
      - ./export:/usr/src/paperless/export
      - ./consume:/usr/src/paperless/consume
    env_file:
      - docker-compose-paperless.env
      - .env
    environment:
      - PAPERLESS_REDIS=redis://broker:6379
      - PAPERLESS_DBHOST=db
