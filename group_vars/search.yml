---
SEARXNG_UWSGI_WORKERS: "1"
SEARXNG_UWSGI_THREADS: "1"
main_uid: "0"
main_gid: "{{ main_uid }}"
docker_compose_generator_output_path: "/root"
containers:
  - service_name: redis
    active: true
    container_name: redis
    image: docker.io/valkey/valkey:8-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    volumes:
      - ./valkey-data2:/data
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  - service_name: searxng
    active: true
    container_name: searxng
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    ports:
      #- "127.0.0.1:8080:8080"
      - 8080:8080
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - "SEARXNG_BASE_URL=https://search.{{ domain_base }}/"
      - "UWSGI_WORKERS={{ SEARXNG_UWSGI_WORKERS }}"
      - "UWSGI_THREADS={{ SEARXNG_UWSGI_THREADS }}"
      - SEARXNG_HOSTNAME=search
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
