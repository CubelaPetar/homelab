  #    labels:
  #      - traefik.enable=true
  #      - "traefik.http.routers.nc.rule=Host(`nc.{{ domain_base }}`)"
  #    volumes:
  #      - "{{ appdata_path }}/apps/nextcloud/data:/var/www/html"
  #    restart: unless-stopped
  #  - service_name: nextcloud-db
  #    active: true
  #    image: postgres:16
  #    environment:
  #      - "POSTGRES_USER={{ nextcloud_db_user }}"
  #      - "POSTGRES_PASSWORD={{ nextcloud_db_password }}"
  #      - "POSTGRES_DB={{ nextcloud_db_name }}"
  #    volumes:
  #      - "{{ appdata_path }}/apps/nextcloud/db:/var/lib/postgresql/data"
  #    restart: unless-stopped
  #  - service_name: nextcloud-redis
  #    active: true
  #    image: redis:alpine
  #    restart: unless-stopped
  ###
  - service_name: nextcloud
    active: true
    image: lscr.io/linuxserver/nextcloud:latest
    container_name: nextcloud
    environment:
      - PUID={{ main_uid }}
      - PGID={{ main_gid }}
      - TZ=Europe/Berlin
    volumes:
      - "{{ appdata_path }}/nextcloud/config:/config"
      - "{{ appdata_path }}/nextcloud/data:/data"
    depends_on:
      - mariadb
    labels:
      - traefik.enable=true
      - "traefik.http.routers.nc.rule=Host(`nc.{{ domain_base }}`)"
    restart: unless-stopped
  - service_name: mariadb
    active: true
    image: lscr.io/linuxserver/mariadb:latest
    container_name: mariadb
    environment:
      - PUID={{ main_uid }}
      - PGID={{ main_gid }}
      - TZ=Europe/Berlin
      - MYSQL_ROOT_PASSWORD={{ NC_MYSQL_ROOT_PASSWORD }}
      - MYSQL_DATABASE={{ NC_MYSQL_DATABASE }}
      - MYSQL_USER={{ NC_MYSQL_USER }}
      - MYSQL_PASSWORD={{ NC_MYSQL_PASSWORD }}
    volumes:
      - "{{ appdata_path }}/databases/nc_db:/config"
    restart: unless-stopped
