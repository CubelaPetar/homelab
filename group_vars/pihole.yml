package_list:
  - bash
  - vim
  - htop
  - curl
  - ca-certificates
  - xclip

# specific

dnsmasq_config_dir: /etc/dnsmasq.d
pihole_config_dir: /etc/pihole
running_as_container: false

default_domain: "reliyya.xyz"
network_cidr: 10.56.0.0/24
dhcp_range_start: 10.56.0.100
dhcp_range_end: 10.56.0.150
dhcp_router: 10.56.0.254
dhcp_active: false
#pxe_server_ip: 10.56.0.249 # lxc on neo

