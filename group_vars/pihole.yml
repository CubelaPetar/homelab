# main
#username: reliyya
#groupname: "{{ username }}"
#
#hostname: pihole

package_list:
  - bash
  - vim
  - htop
  - curl
  - ca-certificates
  - xclip

# specific

dnsmasq_config_dir: /etc/dnsmasq.d
pihole_config_dir: /etc/pihole
running_as_container: false

default_domain: "reliyya.xyz"
network_cidr: 10.56.0.0/21
dhcp_range_start: 10.56.5.100
dhcp_range_end: 10.56.5.250
dhcp_router: 10.56.5.254
dhcp_active: false

dns_overrides:
  # Caddy rProxy
  - { ip: 10.56.0.254, custom_dns: "opnsense.{{ default_domain }}" }
  - { ip: 10.56.0.254, custom_dns: "local.{{ default_domain }}" }
  - { ip: 10.56.0.253, custom_dns: "dns.{{ default_domain }}" }
  - { ip: 10.56.0.1, custom_dns: "neo.{{ default_domain }}" }
  # Non Caddy
  - { ip: 10.56.0.250, custom_dns: "unifi.{{ default_domain }}" }
  - { ip: 10.56.0.20, custom_dns: "pain-ipmi.{{ default_domain }}" }
  - { ip: 10.56.1.1, custom_dns: "pain.{{ default_domain }}" }
  - { ip: 100.86.250.113, custom_dns: "pearson.jc.{{ default_domain }}" }

