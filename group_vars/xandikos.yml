---
#main_uid: "0"
#main_gid: "{{ main_uid }}"
docker_compose_generator_output_path: "/home/reliyya"
containers:
  - service_name: reverse-proxy
    active: true
    image: traefik:v3.2
    command:
      - "--api.insecure=false"
      - "--log.level=info"
      - "--accesslog=false"
      - "--providers.docker"
      # Do not expose containers unless explicitly told so
      - "--providers.docker.exposedbydefault=false"
      - "--entryPoints.web.address=:80"
      - "--entryPoints.websecure.address=:443"
    ports:
      - 80:80
      #- 8080:8080
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
  - service_name: xandikos
    active: true
    image: ghcr.io/jelmer/xandikos
    ports:
      - 8000:8000
    volumes:
      - ./dav:/data
    environment:
      #- "CURRENT_USER_PRINCIPAL=/petar"
      - "AUTOCREATE=yes"
      - "DEFAULTS=yes"
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.cad-auth.basicauth.users=petar:$$2y$$05$$xrL.QLe4AdHd4tNj9FjjWOzwGWvEjJTSwRImTyxdqcv5TwwUt0uKW"
      - "traefik.http.routers.cad.rule=Host(`dav.{{ domain_base }}`)"
      - "traefik.http.routers.cad.entrypoints=web"
      - "traefik.http.routers.cad.middlewares=cad-auth@docker"
    restart: unless-stopped
