hostname: pve-qwerty
domain_base: reliyya.xyz

domain: "{{ hostname }}.{{ domain_base}}"

# ironicbadger.docker_compose_generator
appdata_path: /mnt/nfs/appdata
media_path: /mnt/nfs/media
docker_compose_generator_output_path: /home/{{ main_username }}/docker/

docker_compose_hostname: "qwerty"
# disabled_compose_files:
#  - 05-gitea

# nfs role
nfs_users:
  - "{{ main_username }}"

nfs_root: /mnt/nfs
nfs_appdata_source: /mnt/ssd/appdata
nfs_media_source: /mnt/disk1/media

nfs_mounts:
  - path: "{{ appdata_path }}"
    content: true
    source: "nas.{{ domain_base }}:{{ nfs_appdata_source }}"
    fs: nfs
    opts: defaults,timeo=900,retrans=5,_netdev
  - path: "{{ media_path }}"
    content: true
    source: "nas.{{ domain_base }}:{{ nfs_media_source }}"
    fs: nfs
    opts: defaults,timeo=900,retrans=5,_netdev


package_list:
  - bash-completion
  - curl
  - rsync
  - git
  - htop
  - iftop
  - iotop
  - lm-sensors
  - net-tools
  # - nfs-kernel-server
  - nmap
  - openssh-server
  - python3
  - smartmontools
  - sudo
  - vim
  - tree
  - wget
  - unattended-upgrades
  - apticron
  - apt-listchanges
  - libsensors5
  - figlet
  - wakeonlan
  - ethtool
  - libpam-tmpdir
  # - apt-listbugs
  - needrestart
  # - fail2ban
