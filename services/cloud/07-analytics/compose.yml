services:
  plausible_db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - "{{ appdata_path }}/databases/plausible_db_data:/var/lib/postgresql/data"
    environment:
      - "POSTGRES_PASSWORD={{ plausible_postgres_pass }}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      start_period: 1m

  plausible_events_db:
    image: clickhouse/clickhouse-server:24.12-alpine
    restart: always
    volumes:
      - "{{ appdata_path }}/databases/plausible_clickhouse_event-data:/var/lib/clickhouse"
      - "{{ appdata_path }}/databases/plausible_clickhouse_vent-logs:/var/log/clickhouse-server"
      - "{{ appdata_path }}/plausible/clickhouse/logs.xml:/etc/clickhouse-server/config.d/logs.xml:ro"
      # This makes ClickHouse bind to IPv4 only, since Docker doesn't enable IPv6 in bridge networks by default.
      # Fixes "Listen [::]:9000 failed: Address family for hostname not supported" warnings.
      - "{{ appdata_path }}/plausible/clickhouse/ipv4-only.xml:/etc/clickhouse-server/config.d/ipv4-only.xml:ro"
      # The following configuration files make ClickHouse consume less resources, which is useful for small setups.
      # https://clickhouse.com/docs/en/operations/tips#using-less-than-16gb-of-ram
      - "{{ appdata_path }}/plausible/clickhouse/low-resources.xml:/etc/clickhouse-server/config.d/low-resources.xml:ro"
      - "{{ appdata_path }}/plausible/clickhouse/default-profile-low-resources-overrides.xml:/etc/clickhouse-server/users.d/default-profile-low-resources-overrides.xml:ro"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      - CLICKHOUSE_SKIP_USER_SETUP=1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 -O - http://127.0.0.1:8123/ping || exit 1",
        ]
      start_period: 1m

  plausible:
    image: ghcr.io/plausible/community-edition:v3.2.1
    restart: always
    command: sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    depends_on:
      plausible_db:
        condition: service_healthy
      plausible_events_db:
        condition: service_healthy
    volumes:
      - "{{ appdata_path }}/plausible/plausible-data:/var/lib/plausible"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      - TMPDIR=/var/lib/plausible/tmp
      # required: https://github.com/plausible/community-edition/wiki/configuration#required
      - "BASE_URL=https://plausible.{{ domain_base_pc }}"
      - "SECRET_KEY_BASE={{ PLAUSIBLE_SECRET_KEY_BASE }}"
      # optional: https://github.com/plausible/community-edition/wiki/configuration#optional
      # registration: https://github.com/plausible/community-edition/wiki/configuration#registration
      #- DISABLE_REGISTRATION # Default: invite_only. Possible values are true (full restriction), false (no restriction), and invite_only (only the invited users can register).
      #- ENABLE_EMAIL_VERIFICATION #Default: false
      ## web: https://github.com/plausible/community-edition/wiki/configuration#web
      #- HTTP_PORT # default 8000
      # databases: https://github.com/plausible/community-edition/wiki/configuration#database
      - "DATABASE_URL=postgres://postgres:{{ plausible_postgres_pass | urlencode }}@plausible_db:5432/plausible_db"
      #- CLICKHOUSE_DATABASE_URL # Default: http://plausible_events_db:8123/plausible_events_db
      # geolocation: https://github.com/plausible/community-edition/wiki/configuration#ip-geolocation
      #- IP_GEOLOCATION_DB #https://db-ip.com/
      #- GEONAMES_SOURCE_FILE #Default: /app/lib/location-0.1.0/priv/geonames.lite.csv
      # email: https://github.com/plausible/community-edition/wiki/configuration#email
      #- MAILER_ADAPTER
      - MAILER_EMAIL=analytics@petarcubela.de
      - MAILER_NAME=Plasuble_Analytics
      - SMTP_HOST_ADDR=mail.petarcubela.de
      - SMTP_HOST_PORT=465
      - SMTP_USER_NAME=analytics@petarcubela.de
      - "SMTP_USER_PWD={{ mail_info_password }}"
      - SMTP_HOST_SSL_ENABLED=true
    labels:
      - traefik.enable=true
      - "traefik.http.routers.analytics.rule=Host(`plausible.{{ domain_base_pc }}`)"
      - traefik.http.routers.analytics.entrypoints=websecure
      - traefik.http.routers.analytics.tls.certresolver=cloudflare
      - traefik.http.services.analytics.loadbalancer.server.port=8000


