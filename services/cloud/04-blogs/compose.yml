services: 
  science-blog:
    image: ghost:5-alpine
    labels:
      - traefik.enable=true
      - "traefik.http.routers.purrfectprose.rule=Host(`{{ domain_base_sq }}`)"
      - traefik.http.routers.purrfectprose.entrypoints=websecure
      - traefik.http.routers.purrfectprose.tls.certresolver=cloudflare
    environment:
      - NODE_ENV=development
      - "url=https://{{ domain_base_sq }}"
      #NODE_ENV: development
      - mail__from="'ScienceQorner' support@{{ domain_base_sq }}"
      - mail__transport="SMTP"
      - mail__options__host="mail.{{ domain_base_sq }}"
      - mail__options__port=465
      - mail__options__secure=true
      - "mail__options__auth__user=support@{{ domain_base_sq }}"
      - "mail__options__auth__pass={{ password }}"
      - database__client=mysql
      - database__connection__host=science-blog-db
      - "database__connection__user={{ science_blog_db_user }}"
      - "database__connection__password={{ science_blog_db_pass }}"
      - database__connection__database=science-blog
                                                                               
    volumes:
      - "{{ appdata_path }}/science_blog/content:/var/lib/ghost/content"
    depends_on:
      - science-blog-db
    restart: unless-stopped
  science-blog-db:
    image: mysql:8.0
    volumes:
      - "{{ appdata_path }}/science_blog/db:/var/lib/mysql"
    environment:
      - "MYSQL_ROOT_PASSWORD={{ science_blog_db_pass }}"
    restart: unless-stopped
