services: 
  lldap:
    image: lldap/lldap:stable
    container_name: lldap
    ports:
      # For LDAP, not recommended to expose, see Usage section.
      - "3890:3890"
      # For LDAPS (LDAP Over SSL), enable port if LLDAP_LDAPS_OPTIONS__ENABLED set true, look env below
      - "6360:6360"
      # For the web front-end
      #- "17170:17170"
    networks:
      - ip6net
    volumes:
      - "{{ appdata_path }}/idm/lldap_data:/data"
      - "{{ appdata_path }}/certs/ad/letsencrypt/:/letsencrypt"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.lldap.rule=Host(`ad.{{ domain_base }}`)"
      - traefik.http.services.lldap.loadbalancer.server.port=17170
    environment:
      - "UID={{ main_uid }}"
      - "GID={{ main_gid }}"
      - TZ=Europe/Berlin
      - "LLDAP_JWT_SECRET={{ LLDAP_JWT_SECRET }}"
      - "LLDAP_KEY_SEED={{ LLDAP_KEY_SEED }}"
      - LLDAP_LDAP_BASE_DN=dc=reliyya,dc=xyz
      #If using LDAPS, set enabled true and configure cert and key path
      - LLDAP_LDAPS_OPTIONS__ENABLED=true
      - "LLDAP_LDAPS_OPTIONS__CERT_FILE=/letsencrypt/certs/ad.reliyya.xyz.crt"
      - "LLDAP_LDAPS_OPTIONS__KEY_FILE=/letsencrypt/private/ad.reliyya.xyz.key"
      # You can also set a different database:
      # - LLDAP_DATABASE_URL=mysql://mysql-user:password@mysql-server/my-database
      # - LLDAP_DATABASE_URL=postgres://postgres-user:password@postgres-server/my-database
      # If using SMTP, set the following variables
      - LLDAP_SMTP_OPTIONS__ENABLE_PASSWORD_RESET=true
      - "LLDAP_SMTP_OPTIONS__SERVER=smtp.{{ domain_base }}"
      - LLDAP_SMTP_OPTIONS__PORT=587 # Check your smtp providor's documentation for this setting
      - LLDAP_SMTP_OPTIONS__SMTP_ENCRYPTION=STARTTLS # How the connection is encrypted, either "NONE" (no encryption, port 25), "TLS" (sometimes called SSL, port 465) or "STARTTLS" (sometimes called TLS, port 587).
      - LLDAP_SMTP_OPTIONS__USER=admin # The SMTP user, usually your email address
      - "LLDAP_SMTP_OPTIONS__PASSWORD={{ password }}" # The SMTP password
      - "LLDAP_SMTP_OPTIONS__FROM=no-reply <ad@{{ domain_base }}>" # The header field, optional: how the sender appears in the email. The first is a free-form name, followed by an email between <>.
        #- LLDAP_SMTP_OPTIONS__TO=admin <admin@reliyya.xyz> # Same for reply-to, optional.
    restart: unless-stopped
