services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID={{ main_uid }}
      - PGID={{ main_gid }}
      - TZ={{ ntp_timezone }}
      - JELLYFIN_PublishedServerUrl=jellfin.{{ domain_base }} #optional
      - DOCKER_MODS=linuxserver/mods:jellyfin-opencl-intel
    volumes:
      - "{{ appdata_path }}/apps/jellyfin:/config"
      - "{{ media_path }}/videos/movies:/media:ro"
      - "{{ media_path }}/videos/series:/media2:ro"
      - "{{ media_path }}/downloads:/downloads:ro"
    devices:
      - /dev/dri:/dev/dri
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.{{ domain_base }}`)"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
#    ports:
#      - 8096:8096
      #- 8920:8920 #optional
      #- 7359:7359/udp #optional
      #- 1900:1900/udp #optional
    networks:
      - ip6net
    restart: unless-stopped


