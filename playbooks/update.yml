---
- hosts:
    - homelab
    - vps
  become: true
  serial: 1

  pre_tasks:
    - name: Verify host is reachable before upgrading
      ansible.builtin.ping:

  tasks:
    - name: Update package cache and perform distribution upgrade
      ansible.builtin.apt:
        upgrade: dist
        update_cache: yes
        autoclean: yes

    - name: Check if reboot is required after upgrade
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Reboot the server if required
      ansible.builtin.reboot:
        reboot_timeout: 300
      when: reboot_required_file.stat.exists

    - name: Remove unused dependencies
      ansible.builtin.apt:
        autoremove: yes

    - name: Record whether this host was rebooted
      ansible.builtin.set_fact:
        was_rebooted: "{{ reboot_required_file.stat.exists }}"

- hosts: localhost
  gather_facts: false
  tasks:
    - name: Print reboot summary
      ansible.builtin.debug:
        msg: "{{ item }} was rebooted"
      loop: "{{ groups['homelab'] + groups['vps'] }}"
      when: hostvars[item]['was_rebooted'] | default(false)
